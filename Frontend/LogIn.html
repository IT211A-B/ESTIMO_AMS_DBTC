<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMS Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to bottom,#006422ce, #020068);
    }

    .container {
        width: 360px;
        padding: 25px;
        border-radius: 12px;
        background: #0504534d;
        border: 2px solid #0a054d9a;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        text-align: center;
        color: #fff;
    }

    .logo {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .title {
        font-weight: bold;
        font-size: 18px;
    }

    .subtitle {
        font-size: 11px;
        opacity: 0.8;
        margin-bottom: 15px;
    }

    .toggle {
        display: flex;
        margin-bottom: 15px;
        border: 1px solid #3d5af1;
        border-radius: 8px;
        overflow: hidden;
    }

    .toggle button {
        flex: 1;
        padding: 10px;
        background: transparent;
        border: none;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .toggle button.active {
        background: #1f3c88;
    }

    .icon {
        color: skyblue;
        font-size: 16px;
    }

    label {
        display: block;
        text-align: left;
        font-size: 11px;
        margin: 10px 0 5px;
        opacity: 0.8;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #3d5af1;
        background: transparent;
        color: #fff;
        outline: none;
    }

    input::placeholder {
        color: #aaa;
    }

    .btn {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #2f6bff;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .note {
        margin-top: 8px;
        font-size: 11px;
        opacity: 0.6;
    }

    .toggle button {
        transition: all 0.25s ease;
    }

    .toggle button.active {
        background: #1f3c88;
        transform: scale(1.08);
    }

    .note {
        transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .note.fade {
        opacity: 0;
        transform: translateY(5px);
    }

    /* Loading Screen */
    .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        font-size: 14px;
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .loading-screen.active {
        opacity: 1;
        pointer-events: all;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ccc;
        border-top: 4px solid #2f6bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 10px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>

<body>

<div class="container">
    <div class="logo"></div>

    <div class="title">CUT13Z3LLL AMS</div>
    <div class="subtitle">ATTENDANCE MANAGEMENT SYSTEM</div>

    <div class="toggle">
        <button id="adminBtn" class="active" onclick="switchRole('admin')">
            <span class="icon"></span> ADMIN
        </button>
        <button id="facultyBtn" onclick="switchRole('faculty')">
            <span class="icon"></span> FACULTY
        </button>
    </div>

    <label id="userLabel">USERNAME</label>
    <input type="text" id="username" placeholder="Enter admin username">

    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="Enter password">

    <button class="btn" onclick="login()">Sign In as Admin</button>

    <div class="note" id="accessNote">Administrator access only</div>
</div>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div id="loadingText">Logging in...</div>
</div>

<script>
    let role = "admin";

    function switchRole(selected) {
        role = selected;

        const userLabel = document.getElementById("userLabel");
        const usernameInput = document.getElementById("username");
        const adminBtn = document.getElementById("adminBtn");
        const facultyBtn = document.getElementById("facultyBtn");
        const button = document.querySelector(".btn");
        const note = document.getElementById("accessNote");
        const container = document.querySelector(".container");

        container.classList.remove("fade");
        void container.offsetWidth; 
        container.classList.add("fade");

        if (selected === "admin") {
            userLabel.textContent = "USERNAME"; 
            usernameInput.placeholder = "Enter admin username";
            adminBtn.classList.add("active");
            facultyBtn.classList.remove("active");
            button.textContent = "Sign In as Admin";
            note.textContent = "Administrator access only";
        } else {
            userLabel.textContent = "FACULTY ID";
            usernameInput.placeholder = "Enter faculty ID";
            facultyBtn.classList.add("active");
            adminBtn.classList.remove("active");
            button.textContent = "Sign In as Faculty";
            note.textContent = "Faculty access only";
        }
    }

    function login() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();

        if (user === "" || pass === "") {
            alert("Please fill in all fields.");
            return;
        }

        const loadingScreen = document.getElementById("loadingScreen");
        const loadingText = document.getElementById("loadingText");

        // VALIDATION ADDED
        if (role === "admin") {
            if (user !== "Admin" || pass !== "12345") {
                alert("Invalid Admin credentials!");
                return;
            }
            loadingText.textContent = "Logging in as Admin...";
        } else {
            if (user !== "2O2G" || pass !== "12345") {
                alert("Invalid Faculty credentials!");
                return;
            }
            loadingText.textContent = "Logging in as Faculty...";
        }

        loadingScreen.classList.add("active");

        setTimeout(() => {
            window.location.href = "Attendance.html";
        }, 1500);
    }
</script>

</body>
</html>
